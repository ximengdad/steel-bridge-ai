version: '3.8'

services:
  # 交付物1：知识图谱服务
  kg-service:
    build: ./01_交付物1_知识图谱服务
    container_name: steel-bridge-kg
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    networks:
      - steel-bridge-network

  # 交付物2：大模型服务
  llm-service:
    build: ./02_交付物2_Web端大模型/backend
    container_name: steel-bridge-llm
    environment:
      - KG_SERVICE_URL=http://kg-service:8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8081:8081"
    depends_on:
      - kg-service
    networks:
      - steel-bridge-network

  # 前端（Nginx）
  frontend:
    image: nginx:alpine
    container_name: steel-bridge-web
    volumes:
      - ./02_交付物2_Web端大模型/frontend:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
    depends_on:
      - llm-service
    networks:
      - steel-bridge-network

networks:
  steel-bridge-network:
    driver: bridge
