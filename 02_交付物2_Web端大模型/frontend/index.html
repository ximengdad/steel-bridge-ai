<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钢箱梁智能助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #f5f7fa;
            height: 100vh;
            display: flex;
        }
        
        /* 侧边栏 */
        .sidebar {
            width: 260px;
            background: #fff;
            border-right: 1px solid #e8e8e8;
            display: flex;
            flex-direction: column;
        }
        
        .logo {
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #1890ff;
            border-bottom: 1px solid #e8e8e8;
        }
        
        .scene-tabs {
            padding: 10px;
        }
        
        .scene-tab {
            padding: 12px 16px;
            margin: 5px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .scene-tab:hover { background: #f0f0f0; }
        
        .scene-tab.active {
            background: #e6f7ff;
            color: #1890ff;
            font-weight: 500;
        }
        
        /* 主内容区 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: #fff;
            padding: 16px 24px;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .project-select {
            padding: 6px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            min-width: 200px;
        }
        
        /* 聊天区 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        
        .message {
            display: flex;
            margin-bottom: 20px;
            gap: 12px;
        }
        
        .message.user { flex-direction: row-reverse; }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .message.assistant .avatar { background: #e6f7ff; }
        .message.user .avatar { background: #1890ff; color: white; }
        
        .content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.6;
        }
        
        .message.assistant .content {
            background: #fff;
            border: 1px solid #e8e8e8;
        }
        
        .message.user .content {
            background: #1890ff;
            color: white;
        }
        
        .evidence {
            margin-top: 8px;
            padding: 8px 12px;
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            border-radius: 4px;
            font-size: 12px;
            color: #52c41a;
        }
        
        /* 输入区 */
        .input-area {
            background: #fff;
            padding: 16px 24px;
            border-top: 1px solid #e8e8e8;
        }
        
        .input-box {
            display: flex;
            gap: 12px;
        }
        
        .input-box textarea {
            flex: 1;
            padding: 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            resize: none;
            height: 60px;
            font-family: inherit;
        }
        
        .input-box button {
            padding: 0 24px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .input-box button:hover { background: #40a9ff; }
        .input-box button:disabled { background: #bfbfbf; cursor: not-allowed; }
        
        .templates {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .template-tag {
            padding: 4px 12px;
            background: #f0f0f0;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            color: #595959;
        }
        
        .template-tag:hover {
            background: #e6f7ff;
            color: #1890ff;
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="logo">🏗️ 钢箱梁智能助手</div>
        <div class="scene-tabs">
            <div class="scene-tab active" data-scene="design">
                📐 设计助手
            </div>
            <div class="scene-tab" data-scene="production">
                ⚙️ 生产助手
            </div>
            <div class="scene-tab" data-scene="quality">
                🔍 质检助手
            </div>
            <div class="scene-tab" data-scene="assembly">
                🏗️ 装配助手
            </div>
        </div>
    </div>
    
    <!-- 主内容 -->
    <div class="main">
        <div class="header">
            <h2 id="scene-title">设计助手</h2>
            <select class="project-select">
                <option>PRJ-20260115-001 长江大桥</option>
                <option>PRJ-20260201-002 黄河大桥</option>
            </select>
        </div>
        
        <div class="chat-container" id="chat-container">
            <div class="message assistant">
                <div class="avatar">🤖</div>
                <div class="content">
                    您好！我是钢箱梁智能助手，专注于为钢箱梁全生命周期提供工程建议。
                    <br><br>
                    当前场景：<strong>设计助手</strong>
                    <br>
                    我可以帮您：模块化设计参考、结构优化建议、材料选型、标准查询等。
                </div>
            </div>
        </div>
        
        <div class="input-area">
            <div class="templates" id="templates">
                <span class="template-tag" onclick="useTemplate('【构件B-001】的设计参数是否合理？')">
                    设计参数检查
                </span>
                <span class="template-tag" onclick="useTemplate('类似【主跨680m斜拉桥】的案例有哪些？')">
                    相似案例查询
                </span>
                <span class="template-tag" onclick="useTemplate('【顶板厚度24mm】是否符合规范？')">
                    规范符合性检查
                </span>
            </div>
            <div class="input-box" style="margin-top: 12px;">
                <textarea id="user-input" placeholder="请输入您的问题..."></textarea>
                <button onclick="sendMessage()" id="send-btn">发送</button>
            </div>
        </div>
    </div>

    <script>
        // 配置
        const API_BASE = 'http://localhost:8081';  // 后端服务地址
        let currentScene = 'design';
        let isLoading = false;
        
        // 场景切换
        document.querySelectorAll('.scene-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.scene-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentScene = tab.dataset.scene;
                updateScene(currentScene);
            });
        });
        
        function updateScene(scene) {
            const titles = {
                design: '设计助手',
                production: '生产助手',
                quality: '质检助手',
                assembly: '装配助手'
            };
            document.getElementById('scene-title').textContent = titles[scene];
            
            // 更新模板
            const templates = {
                design: [
                    '【构件B-001】的设计参数是否合理？',
                    '类似【主跨680m斜拉桥】的案例有哪些？',
                    '【顶板厚度24mm】是否符合规范？'
                ],
                production: [
                    '项目【PRJ-001】的生产进度如何？',
                    '【焊接工序】是否存在瓶颈？',
                    '【下周】的产能能否满足交付？'
                ],
                quality: [
                    '【焊缝气孔】可能是什么原因？',
                    '【B-001构件】的质检记录如何？',
                    '【A类缺陷】的处理流程是什么？'
                ],
                assembly: [
                    '【S01节段】的装配步骤是什么？',
                    '【顶板吊装】的路径如何规划？',
                    '【现场空间受限】如何解决？'
                ]
            };
            
            const container = document.getElementById('templates');
            container.innerHTML = templates[scene].map(t => 
                `<span class="template-tag" onclick="useTemplate('${t}')">${t.substring(0, 10)}...</span>`
            ).join('');
            
            // 清空聊天
            document.getElementById('chat-container').innerHTML = `
                <div class="message assistant">
                    <div class="avatar">🤖</div>
                    <div class="content">
                        已切换到<strong>${titles[scene]}</strong>。
                        <br>请输入您的问题，或点击上方模板快速提问。
                    </div>
                </div>
            `;
        }
        
        function useTemplate(text) {
            document.getElementById('user-input').value = text;
        }
        
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            
            if (!message || isLoading) return;
            
            // 添加用户消息
            addMessage(message, 'user');
            input.value = '';
            
            // 显示加载状态
            isLoading = true;
            document.getElementById('send-btn').disabled = true;
            document.getElementById('send-btn').textContent = '思考中...';
            
            try {
                // 调用后端API
                const response = await fetch(`${API_BASE}/api/v2/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        scene: currentScene,
                        context: { project_id: 'PRJ-20260115-001' }
                    })
                });
                
                const data = await response.json();
                
                // 添加助手回复
                let content = data.content;
                if (data.evidence && data.evidence.length > 0) {
                    content += `<div class="evidence">📋 参考来源：${data.evidence[0].title}</div>`;
                }
                addMessage(content, 'assistant');
                
            } catch (error) {
                addMessage('抱歉，服务暂时不可用，请检查后端服务是否启动。', 'assistant');
                console.error(error);
            } finally {
                isLoading = false;
                document.getElementById('send-btn').disabled = false;
                document.getElementById('send-btn').textContent = '发送';
            }
        }
        
        function addMessage(content, role) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
                <div class="content">${content}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        // 回车发送
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
